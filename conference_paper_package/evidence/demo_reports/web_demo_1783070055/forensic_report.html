<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepfake Forensic Report</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0d1117;
            color: #e6e6e6;
            padding: 2rem;
            line-height: 1.6;
        }
        .container { max-width: 1000px; margin: 0 auto; }

        .header {
            text-align: center;
            padding: 2.5rem;
            background: #2ecc7110;
            border-radius: 16px;
            margin-bottom: 2rem;
            border: 1px solid #2ecc7133;
        }
        .badge {
            display: inline-block;
            padding: 0.6rem 2.5rem;
            background: #2ecc71;
            color: white;
            font-size: 2rem;
            font-weight: 700;
            border-radius: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .confidence {
            font-size: 3.5rem;
            font-weight: 800;
            color: #2ecc71;
            margin-top: 1rem;
        }
        .conf-label { color: #8b949e; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        .scores {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin: 2rem 0;
        }
        .score-card {
            background: #161b22;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            border: 1px solid #30363d;
            transition: transform 0.2s;
        }
        .score-card:hover { transform: translateY(-2px); }
        .score-value { font-size: 2rem; font-weight: 700; margin: 0.5rem 0; }
        .score-label { color: #8b949e; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        .section {
            background: #161b22;
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
            border: 1px solid #30363d;
        }
        .section h3 { color: #58a6ff; margin-bottom: 1rem; }

        .boundary-timeline { display: flex; height: 32px; border-radius: 6px; overflow: hidden; }
        .boundary-seg { height: 100%; cursor: pointer; }
        .boundary-seg:hover { opacity: 0.8; }

        .legend { display: flex; gap: 1.5rem; margin-top: 0.8rem; }
        .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; }
        .legend-dot { width: 14px; height: 14px; border-radius: 3px; }

        .frames-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        .frame-card {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #30363d;
            transition: transform 0.2s;
        }
        .frame-card:hover { transform: scale(1.02); }
        .frame-card img { width: 100%; display: block; }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
        }
        .meta-item { color: #8b949e; font-size: 0.85rem; }
        .meta-item strong { color: #c9d1d9; }

        @media (max-width: 768px) {
            .scores { grid-template-columns: repeat(2, 1fr); }
            .meta-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
